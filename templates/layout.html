<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Grimmory Sidecar Tool{% endblock %}</title>
  <style>
    :root {
      --bg: #14151a;
      --panel: #1d1f26;
      --border: #2c2f3a;
      --text: #e7e8ec;
      --muted: #9298a8;
      --accent: #7c9cff;
      --accent-hover: #92aeff;
      --danger: #ff8484;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    header span {
      color: var(--muted);
      font-size: 0.85rem;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .flash {
      background: #3a2230;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    input[type=text], input[type=number], textarea, select {
      width: 100%;
      padding: 0.55rem 0.7rem;
      background: #111216;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    textarea { resize: vertical; min-height: 90px; }
    button, .btn {
      background: var(--accent);
      color: #0c0d10;
      border: none;
      padding: 0.6rem 1.1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.8rem; }
    .result-card {
      display: flex;
      gap: 0.9rem;
      padding: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      align-items: flex-start;
    }
    .result-card img { width: 56px; border-radius: 4px; flex-shrink: 0; }
    .result-card .meta { color: var(--muted); font-size: 0.82rem; }
    .folder-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .folder-grid button {
      background: #111216;
      color: var(--text);
      border: 1px solid var(--border);
      text-align: left;
    }
    .folder-grid button:hover { border-color: var(--accent); }
    .muted { color: var(--muted); font-size: 0.85rem; }
    code { background: #111216; padding: 0.1rem 0.35rem; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Grimmory Sidecar Tool</h1>
    <span>AniList → .metadata.json sidecars</span>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
